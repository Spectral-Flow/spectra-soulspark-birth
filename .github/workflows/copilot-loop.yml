name: Copilot Loop (PR)

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  checks:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        env:
          CI: true
        run: npm test -- --run
